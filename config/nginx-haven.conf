# Haven Relay Nginx Configuration Template
# This file is a template - RELAY_DOMAIN will be replaced during installation

# Haven Relay - HTTP to HTTPS redirect
server {
    listen 80;
    server_name RELAY_DOMAIN;
    
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Haven Relay - HTTPS with WebSocket support
server {
    listen 443 ssl http2;
    server_name RELAY_DOMAIN;
    
    ssl_certificate /etc/letsencrypt/live/RELAY_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/RELAY_DOMAIN/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    
    # Large body size for media uploads (Blossom)
    client_max_body_size 100M;
    
    # All Haven endpoints with WebSocket support
    location / {
        proxy_pass http://127.0.0.1:3355;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # WebSocket support - CRITICAL for Nostr relays
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts for long-lived WebSocket connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 3600s;
        
        # Buffer settings
        proxy_buffering off;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}
